<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Luciano Filippucci | Portfolio</title>
        <link rel="stylesheet" href="styles/debug.css">
        <link rel="stylesheet" href="assets/styles/helpers.css">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.8.0/css/bulma.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma-extensions@4.0.0/dist/css/bulma-extensions.min.css">

        <script defer src="https://use.fontawesome.com/releases/v5.0.7/js/all.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bulma-extensions@4.0.0/dist/js/bulma-extensions.min.js"></script>
        <script
                src="https://code.jquery.com/jquery-3.4.1.js"
                integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU="
                crossorigin="anonymous"></script>


        <script>
            document.addEventListener('DOMContentLoaded', () => {

                // Get all "navbar-burger" elements
                const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);

                // Check if there are any navbar burgers
                if ($navbarBurgers.length > 0) {

                    // Add a click event on each of them
                    $navbarBurgers.forEach( el => {
                        el.addEventListener('click', () => {

                            // Get the target from the "data-target" attribute
                            const target = el.dataset.target;
                            const $target = document.getElementById(target);

                            // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
                            el.classList.toggle('is-active');
                            $target.classList.toggle('is-active');



                        });
                    });
                }

            });

        </script>
        <style>
            hr {
                display: block;
                margin-top: 0.5em;
                margin-bottom: 0.5em;
                margin-left: auto;
                margin-right: auto;
                border-style: inset;
                border-width: 1px;
            }
        </style>
    </head>
    <body>
        <section class="hero  is-fullheight">
            <div class="hero-head">
                <div class="container">
                    <nav class="navbar" role="navigation" aria-label="main navigation">
                        <div class="navbar-brand">
                            <a class="navbar-item" href="#">
                                <img src="assets/images/logo.png" width="112" height="28">
                            </a>

                            <a role="button" class="navbar-burger burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
                                <span aria-hidden="true"></span>
                                <span aria-hidden="true"></span>
                                <span aria-hidden="true"></span>
                            </a>
                        </div>

                        <div id="navbarBasicExample" class="navbar-menu">
                            <div class="navbar-end">
                                <a class="navbar-item is-active">
                                    About Me
                                </a>
                                <a class="navbar-item">
                                    Projects
                                </a>
                                <a class="navbar-item">
                                    Skills
                                </a>
                                <span class="navbar-item">
                                  <a class="button is-info is-inverted">
                                    <span class="icon">
                                      <i class="fas fa-file-pdf"></i>
                                    </span>
                                    <span>CV Download</span>
                                  </a>
                                </span>
                            </div>
                        </div>
                    </nav>
                </div>
            </div>

            <div class="hero-body bd-main-container container">
                <div class="hero-body bd-main-container container">
                    <div class="tile is-ancestor">
                        <div class="tile is-parent">
                            <div class="tile is-child box">
                                <div class="container">
                                    <figure class="image is-128x128">
                                        <img class="is-rounded" src="assets/images/me.png">
                                    </figure>
                                </div>
                            </div>
                        </div>
                    </div>


                </div>
            </div>
        </section>
    </body>
</html>
